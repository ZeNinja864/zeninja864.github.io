<html>
  <body>
    <script>
      async function fetchDirectoryContents(path) {
        const response = await fetch(`https://api.github.com/repos/zeninja864/zeninja864.github.io/contents/${path}`);
        let data = await response.json();
        data = data.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        let htmlString = '<table>';
        htmlString += '<tr><th>File Name</th><th>Creation Date</th></tr>';

        for (let item of data) {
          if (item.type === 'file') {
            const response = await fetch(`https://api.github.com/repos/zeninja864/zeninja864.github.io/contents/${item.path}`);
            const file = await response.json();
            const firstHeader = file.content.match(/^# (.*)/m)?.[1] || item.name;
            htmlString += `<tr><td>${firstHeader}</td><td>${new Date(item.created_at).toLocaleString()}</td></tr>`;
          } else if (item.type === 'dir') {
            const subdirectory = await fetchDirectoryContents(item.path);
            htmlString += `<tr><td colspan="2">${item.name}</td></tr>${subdirectory}`;
          }
        }

        htmlString += '</table>';
        return htmlString;
      }

      (async () => {
        const html = await fetchDirectoryContents('posts');
        document.getElementsByTagName('body')[0].innerHTML = html;

        const table = document.querySelector('table');
        const headerCells = table.querySelectorAll('th');
        headerCells.forEach(cell => {
          cell.addEventListener('click', () => {
            const cellIndex = Array.from(headerCells).indexOf(cell);
            const sortFunction = cellIndex === 0 ? sortByFileName : sortByCreationDate;
            const rows = Array.from(table.rows).slice(1); // Skip header row
            rows.sort(sortFunction);
            table.tBodies[0].append(...rows);
          });
        });

        function sortByFileName(rowA, rowB) {
          const nameA = rowA.cells[0].textContent;
          const nameB = rowB.cells[0].textContent;
          return nameA.localeCompare(nameB);
        }

        function sortByCreationDate(rowA, rowB) {
          const dateA = new Date(rowA.cells[1].textContent);
          const dateB = new Date(rowB.cells[1].textContent);
          return dateA - dateB;
        }
      })()
    </script>
  </body>
</html>
