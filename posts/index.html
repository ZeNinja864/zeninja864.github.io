<html>
  <head>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.2.1/dist/vue.global.min.js"></script>
  </head>
  <body>
    <div id="app">
      <table>
        <thead>
          <tr>
            <th @click="sortBy('name')">Name</th>
            <th @click="sortBy('date')">Date</th>
          </tr>
        </thead>
        <tbody>
          <tr v-for="file in sortedFiles" :key="file.sha">
            <td><a :href="file.html_url">{{ file.name }}</a></td>
            <td>{{ formatDate(file.date) }}</td>
          </tr>
        </tbody>
      </table>
    </div>
    <script>
      const apiUrl = 'https://api.github.com/repos/zeninja864/zeninja864.github.io/contents/posts';

      const app = Vue.createApp({
        data() {
          return {
            files: [],
            sortKey: 'date',
            sortDirection: 'desc'
          }
        },
        async created() {
          const response = await fetch(apiUrl);
          const data = await response.json();
          this.files = data.filter(file => file.type === 'file').map(file => {
            return {
              name: file.name.replace(/\.md$/, ''),
              sha: file.sha,
              date: new Date(file.date)
            };
          });
        },
        computed: {
          sortedFiles() {
            const multiplier = this.sortDirection === 'desc' ? -1 : 1;
            return this.files.sort((a, b) => {
              if (a[this.sortKey] < b[this.sortKey]) {
                return -1 * multiplier;
              }
              if (a[this.sortKey] > b[this.sortKey]) {
                return 1 * multiplier;
              }
              return 0;
            });
          }
        },
        methods: {
          sortBy(key) {
            if (this.sortKey === key) {
              this.sortDirection = this.sortDirection === 'desc' ? 'asc' : 'desc';
            } else {
              this.sortKey = key;
              this.sortDirection = 'desc';
            }
          },
          formatDate(date) {
            const options = {
              year: 'numeric',
              month: 'short',
              day: 'numeric'
            };
            return date.toLocaleDateString('en-US', options);
          }
        }
      });

      app.mount('#app');
    </script>
  </body>
</html>
